name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Compile Python
        run: python -m compileall -q app migrations tests main.py config.py ingestion_service.py storage_service.py

      - name: Check FastAPI app import
        run: python -c "from app.core.app import create_app; create_app()"

      - name: Run backend tests
        run: python -m pytest tests

      - name: Check Alembic offline migration SQL
        run: alembic upgrade head --sql > /tmp/alembic.sql

      - name: Check Python dependencies
        run: pip check

      - name: Check frontend build
        working-directory: frontend
        run: npm run build

      - name: Run frontend E2E tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore

      - name: Check PowerShell scripts
        shell: pwsh
        run: |
          [void][scriptblock]::Create((Get-Content scripts/demo_flow.ps1 -Raw))

      - name: Check Docker Compose config
        run: docker compose config --quiet
